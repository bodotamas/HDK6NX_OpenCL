exercises:
  - question: |
      Írjon egy procedúrát, amelyik kigyűjti a bemenetként kapott számsorozatból az átlagnál nagyobb értékeket egy kimeneti sorozatba!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik kigyűjti a bemenetként kapott számsorozatból a sorozat minimumánál legfeljebb 10-el nagyobb értékeket egy kimeneti sorozatba!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik kigyűjti a bemenetként kapott (páros hosszúságú) sorozat első feléből azokat az értékeket, amelyek nem szerepelnek a második felében!
      (Feltételezzük, hogy egy elem a sorozat első, illetve a második felében is maximum egyszer szerepelhet.)
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik a bemenetként kapott számsorozat elemeit szétválogatja két külön kimeneti sorozatba a szerint, hogy az értékek nagyobbak-e az indexüknél!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik a bemenetként kapott természetes számok sorozatának elemeit szétválogatja két külön kimeneti sorozatba a szerint, hogy az érték páros vagy páratlan számú számjegyen ábrázolható-e 2-es számrendszerben!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik a bemenetként kapott valós számsorozatból két kimeneti sorozatot állít elő, mely közül az elsőben a számok egész része, a másodikban pedig a tört része szerepel!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik a bemenetként kapott természetes számok sorozatából egy olyan 12 elemű kimeneti sorozatot állít elő, melyben azon (bemeneti sorozatbeli) elemek darabszáma szerepel, amelyek oszthatók a kimeneti sorozat adott indexével!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik bemenetként megkap egy $[a, b]$ intervallumot (mint két számértéket), és egy kimeneti sorozatba kigyűjti azon $n$ értékeket, amelyekre teljesül az $a < n! < b$ összefüggés!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANSasdf
  - question: |
      Írjon egy procedúrát, amelyik egy bemeneti valós számsorozat alapján kiszámít egy kimeneti sorozatot, melyben a bemeneti sorozat nemnegatív értékű elemeinek köbei szerepelnek!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egész számok sorozatából kigyűjti azon elemek értékét, amelyek kisebbek az indexüknél!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egész számok sorozatát szétválogatja két kimeneti sorozatra a szerint, hogy azok osztói-e a bemenetként kapott $n$ egész értéknek!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egész számok sorozatát szétválogatja két kimeneti sorozatra a szerint, hogy a szintén bemenetként kapott $n$ egész érték osztója-e az adott értékeknek vagy sem!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egész számok sorozatát szétválogatja két kimeneti sorozatra a szerint, hogy azok négyzetszámok vagy sem!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egy páros elemszámú sorozatból kigyűjti azokat az elemeket, amelyek a sorozat első és második felében is benne vannak!
      (Feltételezzük, hogy egy elem a sorozat első, illetve a második felében is maximum egyszer szerepelhet.)
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik megvizsgálja, hogy egy valós sorozatban a páros vagy a páratlan indexeken lévő elemek maximuma-e a nagyobb!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egy egész értékeket tartalmazó sorozatból kigyűjti a páratlan indexeken lévő páros értékeket egy sorozatba, illetve a páros indexeken lévő páros értékeket egy másikba!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik meghatározza egy valós sorozat páros indexű elemeinek a szorzatát és a páratlan indexű elemeinek az összegét!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egy valós számsorozatból kigyűjti a legfeljebb $\varepsilon$ abszolút értékű elemek indexeit! (Az $\varepsilon$ a procedúra egy bemeneti paramétere.)
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
  - question: |
      Írjon egy procedúrát, amelyik egy valós számsorozat elemeit szétválogatja két kimeneti sorozatra a szerint, hogy az érték kisebb-e vagy sem, mint a sorozat maximum értékének a fele!
      Rajzolja fel a procedúra folyamatábráját is!
    answer:
      ANS
