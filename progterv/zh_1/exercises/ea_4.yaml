exercises:
  - question: |
      Adjon meg 3 kétváltozós halmazműveletet, amely kommutatív (névvel és jelöléssel)!
    answer:
      $\cup, \cap, \triangle$
  - question: |
      Lássa be, hogy a halmazkülönbség művelete nem asszociatív!
    answer:
      $A \setminus (B \setminus C) = \ldots$
  - question: |
      Lássa be (az ismert azonosságok felhasználásával), hogy a halmazkülönbség művelete nem asszociatív!
