      \[
      \overline{X} \setminus (Y \cap \overline{Z}) =
      \overline{X \cup Y} \cup (\overline{X} \cap Z)
      \]
    answer:
      ...
  - question: |
      Lássa be a következő azonosságot!
      \[
      (P \triangle (\overline{R} \setminus Q)) =
      (P \cap Q) \cup (P \cap R) \cup (\overline{P} \cap \overline{Q} \cap \overline{R})
      \]
    answer:
      ...
