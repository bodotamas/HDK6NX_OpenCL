  - question: |
      Tegyük fel, hogy elemek halmazokhoz való tartozását bittömbös formában reprezentáljuk:
      \[
        A = [0, 1, 1, 0, 1, 1, 1], B = [1, 1, 0, 0, 1, 0, 1].
      \]
      Írja fel az $A \cup B$ és $A \triangle B$ halmazokat ugyanilyen reprezentációval!
    answer:
      $A \cup B = [1, 1, 1, 0, 1, 1, 1], \ldots$
