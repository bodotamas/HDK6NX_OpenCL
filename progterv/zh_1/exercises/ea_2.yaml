  - question: |
      Egyszeres lebegőpontos számábrázolás esetén, normalizált számoknál milyen intervallumon változhat a kitevő?
    answer:
      $[-126, 127]$
  - question: |
      Egy egész értékről tudjuk, hogy $[0, 10^{20}]$ intervallumon változhat.
      Legalábbi mennyi bit szükséges az ábrázolásához?
    answer:
      Legalább 67 bit szükséges.
  - question: |
      3 byte-os előjeles egészek esetében hogy néz ki hexadecimális alakban a legkisebb és a legnagyobb ábrázolható érték?
    answer:
      A legkisebb \texttt{80 00 00}, a legnagyobb \texttt{7F FF FF}.
