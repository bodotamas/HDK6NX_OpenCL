  - question: |
      14 biten szeretnénk előjeles egész értékeket ábrázolni.
      Mekkora az ábrázolási tartomány?
    answer:
      $[-2^{13}, 2^{13}-1]$
  - question: |
      Egyszeres lebegőpontos számábrázolás esetén hogyan néz ki a $-\infty$ érték hexadecimális alakban?
    answer:
      FF800000
  - question: |
