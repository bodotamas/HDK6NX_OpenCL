exercises:
  - question: |
      Legalább hány byte szükséges a 3481990 érték előjel nélküli egészként való ábrázolásához?
    answer:
      A számjegyek számáról szóló tétel alapján 3.
  - question: |
      Legalább hány byte szükséges a $15^{70}$ érték előjel nélküli egészként való ábrázolásához?
    answer:
      Legalább 35 byte szükséges.
  - question: |
      Mit jelent a Big Endian és Little Endian ábrázolási mód?
    answer:
      A byte-ok sorrendjére vonatkozik. A Big Endian-nál a nagyobb helyiértékek vannak elöl.
  - question: |
      Milyen értéket ábrázolnak az \texttt{AF 81 C8} előjel nélküli egészként (hexadecimális alakban) megadott byte-ok?
    answer:
      11502024
  - question: |
