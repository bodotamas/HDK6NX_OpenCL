  - question: |
      Egyszeres lebegőpontos számábrázolással \texttt{42 EF 60 00} alakban ábrázolunk egy értéket.
      Hogyan néz ki ennek a negáltja (szintén ilyen ábrázolás mellett, hexadecimális alakban)?
    answer:
      C2 EF 60 00
  - question: |
      Egyszeres lebegőpontos számábrázolás esetén mennyi nem szám (NaN) szimbólum van?
    answer:
