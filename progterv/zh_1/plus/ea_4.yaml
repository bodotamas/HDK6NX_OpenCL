  - question: |
      Lássa be a következő azonosságot!
      \[
      (A \cap B) \cup (B \cap \overline{C}) =
      B \setminus (C \cap \overline{A})
      \]
    answer:
      ...
  - question: |
      Lássa be a következő azonosságot!
      \[
        (P \cap Q \cap R) \cup (P \cap \overline{Q} \cap \overline{R}) =
        P \cap (Q \triangle \overline{R})
      \]
    answer:
      ...
  - question: |
      Lássa be a következő azonosságot!
      \[
        (X \cap \overline{Y}) \cup (X \cap Z) =
        (X \setminus (Y \cap \overline{Z})) \cap \overline{Y \setminus X}
      \]
    answer:
      ...
  - question: |
      Lássa be a következő azonosságot!
      \[
        \overline{A \cap B} \cap (\overline{A} \cup C) =
        \overline{A \cap (B \cup \overline{C})}
      \]
    answer:
      ...
  - question: |
      Lássa be a következő azonosságot!
      \[
        Q \triangle \overline{P \cup R} =
        (P \cap Q) \cup (R \cap Q) \cup (\overline{P} \cap \overline{Q} \cap \overline{R})
      \]
    answer:
      ...
