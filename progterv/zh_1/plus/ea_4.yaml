exercises:
  - question: |
      Tegyük fel, hogy elemek halmazokhoz való tartozását bittömbös formában reprezentáljuk:
      \[
        A = [1, 0, 1, 0, 1, 0, 1], B = [1, 1, 1, 0, 0, 0, 0].
      \]
      Írja fel az $A \cup B$ és $A \triangle B$ halmazokat ugyanilyen reprezentációval!
    answer:
      $A \cup B = [1, 1, 1, 1, 1, 0, 1], \ldots$
  - question: |
      Tegyük fel, hogy elemek halmazokhoz való tartozását bittömbös formában reprezentáljuk:
      \[
        A = [1, 0, 1, 0, 1, 0, 1], B = [1, 1, 1, 0, 0, 0, 0].
      \]
      Írja fel az $A \cap B$ és $A \setminus B$ halmazokat ugyanilyen reprezentációval!
    answer:
      $A \cap B = [1, 0, 1, 0, 0, 0, 0], \ldots$
  - question: |
      Tegyük fel, hogy elemek halmazokhoz való tartozását bittömbös formában reprezentáljuk:
      \[
        A = [1, 0, 1, 0, 1, 0, 1], B = [1, 1, 1, 0, 0, 0, 0].
      \]
      Írja fel az $\overline{A} \cap B$ és $A \cup \overline{B}$ halmazokat ugyanilyen reprezentációval!
    answer:
      $\overline{A} \cap B = [0, 1, 0, 0, 0, 0, 0], \ldots$
  - question: |
      Tegyük fel, hogy elemek halmazokhoz való tartozását bittömbös formában reprezentáljuk:
