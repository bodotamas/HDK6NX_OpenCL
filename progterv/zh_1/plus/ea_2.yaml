  - question: |
      13 biten szeretnénk előjeles egész értékeket ábrázolni.
      Mekkora az ábrázolási tartomány?
    answer:
      $[-2^{12}, 2^{12}-1]$
  - question: |
      17 biten szeretnénk előjeles egész értékeket ábrázolni.
      Mekkora az ábrázolási tartomány?
    answer:
      $[-2^{16}, 2^{16}-1]$
  - question: |
      Egyszeres lebegőpontos számábrázolással \texttt{C6 65 40 81} alakban ábrázolunk egy értéket.
      Hogyan néz ki ennek a negáltja (szintén ilyen ábrázolás mellett, hexadecimális alakban)?
    answer:
      \texttt{46 65 40 81}
  - question: |
      Egyszeres lebegőpontos számábrázolás esetén mennyi normalizált formában ábrázolható szám van?
    answer:
      $254 \cdot 2^{24}$
  - question: |
      Egyszeres lebegőpontos számábrázolás esetén, normalizált számoknál milyen intervallumon változhat az eltolt kitevő?
    answer:
      $[1, 254]$
  - question: |
      Egy egész értékről tudjuk, hogy $[0, 10^{14}]$ intervallumon változhat.
      Legalábbi mennyi bit szükséges az ábrázolásához?
    answer:
      Legalább 47 bit szükséges hozzá.
  - question: |
      2 byte-os előjeles egészek esetében hogy néz ki hexadecimális alakban a legkisebb és a legnagyobb ábrázolható érték?
    answer:
      A legkisebb \texttt{80 00}, a legnagyobb \texttt{7F FF}.
  - question: |
      2 byte-os előjel nélküli egészek esetében hogy néz ki hexadecimális alakban a legkisebb és a legnagyobb ábrázolható érték?
    answer:
      A legkisebb \texttt{00 00}, a legnagyobb \texttt{FF FF}.
