  - question: |
      Szöveget egymás után, Pascal konvenció szerint a következő byte-okon tárolunk:
      \begin{center}
      \texttt{02 A3 63 04 AA 34 20 45 03 BB 01 02}
      \end{center}
      \begin{itemize}
      \item Törölje minden szövegből az utolsó byte-ot, és adja meg ezeket C konvenció szerint tárolva?
      \item Az így kapott szövegeket konkatenálja össze, és adja meg az eredményt Pascal konvenció szerint!
      \end{itemize}
    answer:
      ...
  - question: |
      Szövegeket egymás után, Pascal konvenció szerint a következő byte-okon tárolunk:
      \begin{center}
      \texttt{02 A3 63 04 AA 34 20 45 03 BB 01 02}
      \end{center}
      \begin{itemize}
      \item Konkatenálja az első két sztringet, és írja fel az ez után kapott szövegeket C konvenció szerint!
      \item Ez után minden szöveg elejéhez és végéhez fűzzön hozzá egy \texttt{07} byte-ot, majd írja fel a kapott szövegeket Pascal konvenció szerint!
      \end{itemize}
