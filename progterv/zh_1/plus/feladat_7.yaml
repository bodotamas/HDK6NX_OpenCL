  - question: |
      Szövegeket egymás után, C konvenció szerint a következő byte-okon tárolunk:
      \begin{center}
      \texttt{AA 57 8C 00 00 64 C2 00 AB 11 00 00}
      \end{center}
      \begin{itemize}
      \item Minden szöveg végéhez fűzzön hozzá két szóközt, és adja meg Pascal konvenció szerint! (A szóköz a hexadecimális alakban \texttt{20}-as értékű byte.)
      \item Az így kapott szövegeket konkatenálja össze, és írja fel C konvenció szerint!
      \end{itemize}
