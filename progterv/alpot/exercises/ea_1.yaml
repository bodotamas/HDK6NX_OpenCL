  - question: |
      Ismerjük a $D = \{5, 3, 1\}$ és az $F = \{7, 5, 1\}$ halmazokat.
      Írja fel a $(D \setminus F) \times (F \setminus D)$ halmaz elemeit?
    answer:
      $(D \setminus F) \times (F \setminus D) = \{(3, 7)\}$
  - question: |
