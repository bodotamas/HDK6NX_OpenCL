  - question: |
      Mit nevezünk absztrakt adattípusnak?
    answer:
      Az adatok ($A$) és a rajtuk elvégezhető műveletek ($M$) halmazát.
      \[
      T = (A, M)
      \]
  - question: |
      Írja fel a valós szám absztrakt adattípust a 4 alapművelettel!
    answer:
      $T = (\mathbb{R}, \{+, -, \cdot, /\})$
  - question: |
      Definiálja a Déscartes szorzatot!
    answer:
      $A \times B = \{(a, b)\mid a \in A, b \in B\}$
  - question: |
      Számítsa ki az $A = \{1, 7, 8\}$ és a $B = \{2, 3\}$ halmazok Déscartes szorzatát!
